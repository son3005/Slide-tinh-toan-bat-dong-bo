<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asynchronous Computing - Interactive Presentation</title>
    
    <!-- D3.js for Relationship Graphs -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AISA Core Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <!-- Top Progress Bar -->
    <div id="progress-bar-container">
        <div id="progress-bar"></div>
    </div>

    <!-- Main Dynamic Slide Container -->
    <main id="slide-container" class="slide-transition">
        <!-- Content injected dynamically by engine.js -->
    </main>

    <!-- Navigation Controls -->
    <nav id="navigation">
        <button id="btn-prev" class="nav-btn" disabled>
            <span class="btn-core">Previous</span>
        </button>
        <div style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; color: var(--text-secondary);">
            <input type="number" id="slide-input" value="1" min="1" style="width: 60px; text-align: center; border: 2px solid var(--border-subtle); border-radius: 8px; padding: 4px; font-weight: bold; color: var(--text-primary); font-family: inherit; background: var(--bg-secondary); outline: none;">
            <span id="slide-total">/ 1</span>
        </div>
        <button id="btn-next" class="nav-btn">
            <span class="btn-core">Next</span>
        </button>
    </nav>

    <!-- Core Engine -->
    <script type="module" src="js/engine.js"></script>
</body>
</html>
