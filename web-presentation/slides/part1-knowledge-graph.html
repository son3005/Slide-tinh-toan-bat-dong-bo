<style>
    .kg-container {
        position: relative;
        width: 1000px;
        height: 600px;
        margin: 0 auto;
        background: var(--bg-primary);
        border-radius: 16px;
        border: 1px solid var(--border-subtle);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
    }
    
    .kg-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
    }
    
    .kg-edge {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        transition: stroke-dashoffset 1s ease-in-out, opacity 0.5s ease;
        opacity: 0;
    }
    
    .kg-edge.active {
        stroke-dashoffset: 0;
        opacity: 1;
    }
    
    .kg-edge-label {
        opacity: 0;
        transition: opacity 0.5s ease 0.5s;
        font-size: 14px;
        fill: var(--text-secondary);
        font-style: italic;
    }
    
    .kg-edge.active + .kg-edge-label {
        opacity: 1;
    }

    .kg-node {
        position: absolute;
        z-index: 2;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: bold;
        text-align: center;
        background: var(--bg-secondary);
        border: 2px solid var(--border-subtle);
        color: var(--text-primary);
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    
    .kg-node.active {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    
    .node-root { border-color: var(--accent-primary); color: var(--accent-primary); font-size: 1.2rem; }
    .node-mp { border-color: #f59e0b; color: #f59e0b; }
    .node-thread { border-color: #3b82f6; color: #3b82f6; }
    .node-async { border-color: #10b981; color: #10b981; }
    .node-concept { border-color: #8b5cf6; color: #8b5cf6; border-style: dashed; }
    .node-problem { border-color: #ef4444; color: #ef4444; border-style: dotted; }

    #btn-kg-next {
        position: absolute;
        bottom: 20px;
        right: 20px;
        z-index: 10;
        padding: 10px 20px;
        background: var(--accent-primary);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: opacity 0.3s;
    }
</style>

<div style="display: flex; flex-direction: column; height: 100%; width: 100%; padding: 2rem; align-items: center;">
    <h2 style="margin-bottom: 1rem;">1.4 Lập trình đồng thời trong Python: Bức tranh toàn cảnh</h2>
    
    <div class="kg-container" id="kg-container">
        
        <!-- SVG for Edges -->
        <svg class="kg-svg">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-secondary)" />
                </marker>
                <marker id="arrowhead-mp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
                </marker>
                <marker id="arrowhead-thread" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
                </marker>
                <marker id="arrowhead-async" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" />
                </marker>
            </defs>
            
            <!-- Step 1: Branches -->
            <path class="kg-edge step1" d="M 500 80 L 200 200" stroke="var(--text-secondary)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
            <text class="kg-edge-label" x="320" y="130" transform="rotate(35, 320, 130)">Đa tiến trình</text>
            
            <path class="kg-edge step1" d="M 500 80 L 500 200" stroke="var(--text-secondary)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
            <text class="kg-edge-label" x="510" y="150">Đa luồng</text>
            
            <path class="kg-edge step1" d="M 500 80 L 800 200" stroke="var(--text-secondary)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
            <text class="kg-edge-label" x="650" y="130" transform="rotate(-35, 650, 130)">Bất đồng bộ</text>

            <!-- Step 2: GIL and Processes vs Threads -->
            <path class="kg-edge step2" d="M 500 200 L 500 350" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowhead-thread)"/>
            <text class="kg-edge-label" x="510" y="280">Bị kẹt bởi</text>

            <path class="kg-edge step2" d="M 200 200 Q 300 280 440 350" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead-mp)"/>
            <text class="kg-edge-label" x="310" y="320">Né tránh thành công</text>

            <!-- Step 3: Asyncio Internals -->
            <path class="kg-edge step3" d="M 800 200 L 800 350" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowhead-async)"/>
            <text class="kg-edge-label" x="810" y="280">Sử dụng</text>
            
            <path class="kg-edge step3" d="M 800 200 Q 950 250 850 350" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead-async)"/>
            <text class="kg-edge-label" x="900" y="300">Chạy trên</text>

            <!-- Step 4: Workloads -->
            <path class="kg-edge step4" d="M 200 500 L 200 240" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
            <text class="kg-edge-label" x="210" y="400">Phù hợp nhất</text>

            <path class="kg-edge step4" d="M 800 500 L 800 240" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
            <text class="kg-edge-label" x="810" y="400">Tối ưu hiệu suất</text>
            
            <path class="kg-edge step4" d="M 800 500 Q 650 400 530 240" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
            <text class="kg-edge-label" x="650" y="370">Tương đối tốt</text>

        </svg>

        <!-- HTML Nodes -->
        <!-- Center Root -->
        <div class="kg-node node-root step0" style="left: 500px; top: 80px;">Python Concurrency</div>
        
        <!-- Level 1 -->
        <div class="kg-node node-mp step1" style="left: 200px; top: 200px;">Multiprocessing</div>
        <div class="kg-node node-thread step1" style="left: 500px; top: 200px;">Threading</div>
        <div class="kg-node node-async step1" style="left: 800px; top: 200px;">Asyncio</div>

        <!-- Level 2 (Problems & Internals) -->
        <div class="kg-node node-problem step2" style="left: 500px; top: 350px;">GIL (Global Interpreter Lock)</div>
        
        <div class="kg-node node-concept step3" style="left: 800px; top: 350px;">Event Loop</div>
        <div class="kg-node node-concept step3" style="left: 950px; top: 400px; font-size: 0.8rem; padding: 6px 12px;">Single Thread</div>

        <!-- Level 3 (Workloads) -->
        <div class="kg-node node-concept step4" style="left: 200px; top: 500px;">CPU-Bound (Tính toán)</div>
        <div class="kg-node node-concept step4" style="left: 800px; top: 500px;">I/O-Bound (Chờ đợi)</div>

        <button id="btn-kg-next">
            Bước tiếp <i class="fas fa-arrow-right"></i>
        </button>
    </div>
</div>
