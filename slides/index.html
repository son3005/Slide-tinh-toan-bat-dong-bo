<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính toán Bất đồng bộ - Slide Thuyết trình</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="presentation-container">
        <!-- Progress Bar -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Navigation Controls -->
        <div class="controls">
            <button class="control-btn" id="prevBtn" aria-label="Slide trước">&larr;</button>
            <div class="slide-counter">
                <span id="currentSlideNum">1</span> / <span id="totalSlidesNum">36</span>
            </div>
            <button class="control-btn" id="nextBtn" aria-label="Slide sau">&rarr;</button>
            <button class="control-btn theme-toggle-btn" id="themeToggleBtn" aria-label="Đổi giao diện" style="font-size: 1rem;">🌓</button>
        </div>

        <!-- Slides Wrapper (Slides will be loaded dynamically here) -->
        <div class="slides" id="slidesWrapper">
            <div class="loading-spinner-wrapper" id="loadingSpinnerWrapper">
                <div class="loop-spinner" style="width: 50px; height: 50px;"></div>
                <p style="margin-top: 1rem; color: var(--text-secondary); font-family: var(--font-heading);">Đang tải các slide thuyết trình...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
