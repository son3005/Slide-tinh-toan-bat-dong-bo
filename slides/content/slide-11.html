<div class="glass-card simulation-card">
    <span class="slide-header">Phần 01 · Mô phỏng</span>
    <h3>Mô phỏng 02: Hoạt động của ThreadPool vs ProcessPool</h3>
    <div class="sim-wrapper">
        <div class="sim-controls">
            <span class="label">Mô hình:</span>
            <button class="sim-btn active" id="useThreadPoolBtn">ThreadPool (GIL Active)</button>
            <button class="sim-btn" id="useProcessPoolBtn">ProcessPool (GIL Bypassed)</button>
            <span class="divider-v">|</span>
            <button class="sim-btn btn-rose" id="runPoolTasksBtn">Chạy 8 Tác vụ CPU</button>
            <button class="sim-btn btn-sec" id="resetPoolSimBtn">Đặt lại</button>
        </div>
        <div class="pool-sim-container" id="poolSimContainer">
            <div class="pool-left">
                <h5>Hồ chứa (Pool) & Worker</h5>
                <div class="gil-lock-indicator" id="gilLockIndicator">
                    <span class="lock-icon">🔒</span> GIL LOCK
                </div>
                <div class="pool-workers">
                    <div class="worker-node" id="worker-0">
                        <span class="w-label">Worker 0</span>
                        <div class="w-status">Rảnh</div>
                    </div>
                    <div class="worker-node" id="worker-1">
                        <span class="w-label">Worker 1</span>
                        <div class="w-status">Rảnh</div>
                    </div>
                    <div class="worker-node" id="worker-2">
                        <span class="w-label">Worker 2</span>
                        <div class="w-status">Rảnh</div>
                    </div>
                    <div class="worker-node" id="worker-3">
                        <span class="w-label">Worker 3</span>
                        <div class="w-status">Rảnh</div>
                    </div>
                </div>
            </div>
            <div class="pool-right">
                <h5>Đồ thị tải nhân CPU (Core Load)</h5>
                <div class="cpu-cores-graphs">
                    <div class="core-graph">
                        <span class="core-label">Core 0</span>
                        <div class="graph-bar-container"><div class="graph-bar" id="bar-0"></div></div>
                        <span class="core-val" id="val-0">0%</span>
                    </div>
                    <div class="core-graph">
                        <span class="core-label">Core 1</span>
                        <div class="graph-bar-container"><div class="graph-bar" id="bar-1"></div></div>
                        <span class="core-val" id="val-1">0%</span>
                    </div>
                    <div class="core-graph">
                        <span class="core-label">Core 2</span>
                        <div class="graph-bar-container"><div class="graph-bar" id="bar-2"></div></div>
                        <span class="core-val" id="val-2">0%</span>
                    </div>
                    <div class="core-graph">
                        <span class="core-label">Core 3</span>
                        <div class="graph-bar-container"><div class="graph-bar" id="bar-3"></div></div>
                        <span class="core-val" id="val-3">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
